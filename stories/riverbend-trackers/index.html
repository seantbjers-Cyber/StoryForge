  "heroName": "the team",
  "passages": {
    "start": {
      "text": "The Bjers family had been at Hemlock Bend Campground for exactly two hours, and in that time:\nPappy had set up the big tent. Grammy had set up the little tent. Momma had hung a string of solar lanterns between two pines, and Dad was building a fire that did not yet need building.\nAuntie RahRah had laid out her field pack on the picnic table — long-handled snips, a folded pillowcase, very thick gloves, and a battered field guide that had clearly been read in the rain. Auntie RahRah was a doctor of biology, which Jordan considered the coolest job a person could possibly have.\nJordan had unpacked, repacked, and double-checked the purple first aid kit she always carried, because that was Jordan.\nKellan had spun in approximately seventy-three circles, with no sign of stopping. Somewhere around forty he had begun trying to count the trees.\nTheir cousin Ariston had found four good rocks, two interesting bugs, and one very small frog.\nThe water shoes were lined up by the tent door, three pairs in a row, because Auntie RahRah had said they'd be working near the river today.\nIt was the first morning of the camping trip. Everything was exactly as it should be.\n\"You can't count trees while spinning,\" Jordan said.\n\"I'm at six hundred,\" Kellan reported.\n\"You are not.\"\n\"Six hundred and ONE.\"\nAriston was crouched by a patch of moss, not moving a muscle, watching something very small.\n\"Centipede,\" he said, without looking up. \"Twenty-two legs. Maybe twenty-four.\"\n\"Cool,\" said Kellan, and flopped down to see.\nThen Auntie RahRah came around the back of the camper holding three small notebooks and three short pencils, and the day got real.\n\"Trackers,\" Auntie RahRah said. \"Front and center.\"\nJordan was front and center in two seconds flat. Kellan came in at one and a half, but sideways.\n\"You three have an assignment. We're walking the river bend. If you spot a sign — a track, a sound, anything moving in the water — you follow it back to its source. From a respectful distance. And you write down what you see.\"\nJordan opened her notebook to the first clean page. Kellan opened his and immediately drew a worm.\n\"Listen to Ariston,\" Auntie RahRah said. \"He knows what to look for. I'll be at camp — holler if you need me.\"\nAriston didn't say anything. But he slid his pencil behind his ear like a real tracker, and Jordan made a quiet note to do the same later.",
      "choices": [{"text": "Head down to the river", "next": "ariston_briefing"}]
    },
    "ariston_briefing": {
      "text": "The path to the river smelled like pine sap and damp leaves. The three of them walked down to the bend, where the trees opened up and the water slowed.\nAriston turned to face Jordan and Kellan. He held up three fingers.\n\"Three things to look for,\" he said. \"One — tracks. Mud, sand. They tell you who's been here.\"\nJordan wrote TRACKS in capital letters. Ariston glanced at her notebook, then at her face, and seemed to decide something. He kept going.\n\"Two — sounds. If something's calling and won't stop, that's a sign.\"\nKellan made a noise that was definitely wrong. Ariston ignored him.\n\"Three — water. Splashing where there shouldn't be splashing. Movement in the shallows.\"\nJordan looked at her notebook. Then at the river. Then up the trail in three different directions.\n\"Pick a way,\" Ariston said.",
      "choices": [
        {"text": "Follow the muddy bank looking for tracks", "next": "deer_tracks"},
        {"text": "Listen for an animal sound", "next": "heron_search"},
        {"text": "Watch the shallows for movement", "next": "turtle_splash"}
      ]
    },
    "deer_tracks": {
      "text": "The mud along the riverbank was soft and cool and absolutely covered in prints.\nAriston knelt down so close his nose was almost in the dirt. He looked, frankly, like a kid who had been waiting his whole life to find a track.\n\"Deer,\" he said. \"Two crescents — that's the hoof split. Small. Probably young.\"\nJordan crouched beside him.\n\"How young?\"\n\"Few weeks, maybe. The print's not deep enough to be an adult.\"\nKellan had also crouched, but mostly to study a beetle. The beetle was deeply uninterested in being studied.\nAriston traced the prints with his finger through the mud. They led off the bank, through a patch of ferns, and into the trees.\n\"They go up there,\" he whispered.",
      "choices": [{"text": "Follow the prints", "next": "deer_choice"}]
    },
    "deer_choice": {
      "text": "The prints led them through the ferns to the edge of a small clearing. Ariston stopped them with one hand. He pointed.\nThere, at the far side of the clearing, the prints disappeared into a thicket of low brush. Something rustled inside it. Something small.\nJordan's grip tightened on her pencil. Kellan, for once in his life, was completely silent.\n\"We can stay back and watch from here,\" Ariston whispered. \"Or we can get closer.\"",
      "choices": [
        {"text": "Stay at the edge of the clearing and watch", "next": "naturalists_ending"},
        {"text": "Slip into the brush for a closer look", "next": "fawn_alone"}
      ]
    },
    "naturalists_ending": {
      "text": "They settled in at the edge of the clearing — Ariston flat on his stomach, Jordan in a careful kneel, Kellan sitting absolutely still for the first time in recorded history.\nA fawn stepped out of the brush. White spots on a russet back. Ears too big for its head. It chewed on a fern for a moment and then looked directly at them.\nIt did not run.\nIt watched them watch it for what felt like a very long time. Jordan was so still she forgot to write anything down. Then the fawn turned and slipped back into the brush, like a small brown ghost.\n\"That,\" Ariston whispered, \"was the best thing I've ever seen.\"\nThat was very high praise from Ariston.\nKellan sat up and announced, in the loudest whisper any human has ever produced, \"I LOVE BEING A TRACKER.\"",
      "isEnding": true
    },
    "fawn_alone": {
      "text": "They moved into the brush as quiet as they could, which for Jordan meant very quiet, for Ariston meant almost invisible, and for Kellan meant a sort of crashing rustle that he was extremely proud of.\nIn a hollow under a fallen log lay a fawn. White spots. Curled up small. Eyes half-closed. No mama in sight.\nJordan's mouth fell open.\n\"It's all alone,\" she whispered.\nKellan reached one slow hand toward it.\n\"Wait,\" Ariston said.\nBut three trackers, in a hollow, with a fawn — that was a lot of opinions in one small space.",
      "choices": [
        {"text": "Pick it up — it needs help", "next": "gentle_lesson"},
        {"text": "Back away quietly", "next": "silent_witnesses"}
      ]
    },
    "gentle_lesson": {
      "text": "Kellan touched the fawn's back with one careful finger before Jordan could grab his wrist.\nThe fawn didn't move. She didn't even open her eyes. Just breathed. In. Out.\nBehind them, ferns rustled.\nThat was when Auntie RahRah parted them and crouched down.\n\"Hands away, please. Slowly.\"\nAll three of them froze. All three of them slowly stepped back.\nAuntie RahRah didn't touch the fawn either. She just looked at her for a long moment.\n\"This is exactly where mama left her,\" she said quietly. \"Fawns hide when their mothers go to feed. They stay still on purpose. If we touch her, our smell stays on her — and mama might not come back.\"\nKellan's eyes got very big.\n\"I just wanted to help,\" he whispered.\n\"I know, bud. The best help here is to leave her be. Mama is closer than you think.\"\nThey walked back to the trail together. Jordan wrote FAWNS HIDE ON PURPOSE across the top of a clean page in her notebook, and underlined it three times.\nBehind them, somewhere in the brush, a doe stepped out of the ferns.",
      "isEnding": true
    },
    "silent_witnesses": {
      "text": "\"Don't touch her,\" Ariston whispered. \"Mama comes back. We have to go.\"\nJordan grabbed Kellan's hand before his hand could grab the fawn. She squeezed twice, which was their signal for do exactly what I do right now or I will tell on you later.\nKellan, miraculously, listened.\nThey backed out of the hollow one careful step at a time. Jordan walked backward. Ariston walked backward. Kellan walked backward in an extremely dramatic crouching tiptoe that was somehow louder than walking forward.\nOnce they were back on the trail, Ariston let out a breath.\n\"Good,\" he said. \"She'll be okay. Mama was probably watching us the whole time.\"\nJordan turned around very slowly and looked at the trees.\nThe trees, of course, said nothing. But somewhere in them, a doe stepped out into a clearing they could no longer see, and a fawn lifted her head, and the world went on exactly the way it was supposed to.",
      "isEnding": true
    },
    "heron_search": {
      "text": "A sound came through the trees that didn't belong to the trees — a ragged, broken chirp, almost like a dog's bark but rougher.\nAriston went very still. Ariston was already pretty still as a baseline, so this was a noticeable upgrade.\n\"That's a bird,\" he said. \"Big one. And it's stuck.\"\n\"How do you know it's stuck?\" Jordan asked.\n\"Because it won't stop.\"\nThey followed the sound off the path, around a stand of birches, down to where the river curved into a shallow bend. The chirp got louder. Then it got desperate.\nThere, on a half-sunken log, was a great blue heron — long legs, long neck, dagger-sharp beak — with one leg tangled in a knot of green fishing line.",
      "choices": [{"text": "Get a better look", "next": "heron_choice"}]
    },
    "heron_choice": {
      "text": "They crouched in the reeds about ten feet back. The heron flapped, fell, flapped again. The fishing line was wrapped twice around its leg and snagged on a branch under the water. Every time it pulled, the snag pulled back.\n\"We have to help it,\" Jordan said.\n\"We can't pick up a great blue,\" Ariston said quickly. \"Beaks. They go for your eyes.\"\nJordan looked at the heron. The heron looked at Jordan. Its beak was approximately the length of a steak knife.\n\"Okay,\" Jordan said. \"But we still have to do something.\"",
      "choices": [
        {"text": "Try to cut the line yourselves", "next": "heron_close_call"},
        {"text": "Send Kellan back for Auntie RahRah", "next": "heron_heroes"}
      ]
    },
    "heron_close_call": {
      "text": "Jordan crept forward on her hands and knees. Ariston followed. Kellan, sensing he had not been invited, came anyway.\nJordan pulled her little folding scissors out of her first aid kit. She had never been so glad to be the kind of person who packed scissors.\nShe reached, slowly, slowly, for the fishing line.\nThe heron exploded.\nWings the size of pillowcases beat the air. The beak shot forward like a striking snake. Ariston yelled \"BACK!\" and yanked Jordan's collar so hard she fell backward into the reeds. The beak missed her cheek by maybe two inches.\nThe three of them scrambled back, panting, hearts going a thousand miles an hour.\n\"Okay,\" Ariston said, when he could speak. \"Okay. We need an adult.\"",
      "choices": [{"text": "Run for Auntie RahRah", "next": "brave_recovery"}]
    },
    "brave_recovery": {
      "text": "Kellan was already running.\nHis little legs pumped so fast he was practically a blur. He zigged left, zagged right, didn't trip on a single root, and by the time Jordan and Ariston caught up he was hauling Auntie RahRah back down the path from camp by one hand, talking the entire time.\n\"BIG BIRD STUCK STRING LEG SCISSORS DIDN'T WORK BEAK ALMOST GOT JORDAN —\"\n\"Slow down, bud, deep breath.\"\n\"OKAY DEEP BREATH DONE LET'S GO.\"\nAuntie RahRah crouched in the reeds with all three of them. She opened her field pack — long-handled snips, a pillowcase, and very thick gloves.\n\"You three did the right thing coming to get me,\" she said. She looked Jordan in the eye. \"Especially after backing off. That's the hard part.\"\nShe covered the heron's head with the pillowcase, which calmed it down completely. Then she snipped the line in three quick clips. The heron stood up, tested its leg, and walked into the river like it had places to be.\nIt didn't say thank you. Herons never do.\nBut Jordan wrote KNOW WHEN TO STOP in her notebook, and underlined it twice.",
      "isEnding": true
    },
    "heron_heroes": {
      "text": "\"Kellan,\" Jordan said. \"I need you to be the fastest you've ever been in your life.\"\nKellan's eyes lit up.\n\"I am SO fast.\"\n\"Run back to Auntie RahRah. Tell her there's a heron stuck in fishing line at the river bend. Don't get distracted. Don't stop to look at bugs. Don't —\"\nBut he was already gone.\nJordan and Ariston watched the heron from the reeds. They didn't get any closer. Ariston quietly sketched it in his notebook — long legs, tangled line, the careful angle of its head.\n\"You know what's cool?\" Ariston whispered. \"It hasn't tried to fly off. It's trusting us a little, I think.\"\n\"Or it's tired.\"\n\"Could be both.\"\nAuntie RahRah came down from camp at a jog with Kellan riding piggyback because his legs had, in his words, used up all the running.\nShe had her field pack, with snips and a pillowcase and gloves. She freed the heron in under a minute. The heron tested its leg, considered them all very briefly, and walked into the river without comment.\n\"That,\" Auntie RahRah said, \"is exactly how you're supposed to do this. Spot the problem. Don't touch the bird. Get the right grown-up. You three are real trackers.\"\nKellan slid off her back and announced, to the entire river, \"WE ARE REAL TRACKERS.\"",
      "isEnding": true
    },
    "turtle_splash": {
      "text": "There was a splash in the shallows that didn't sound like a fish. It sounded, if anything, frustrated.\nAriston went still. Then he pointed.\nHalf-buried in the shallow water by a big sun-warmed rock, something small was thrashing — a green-brown shell flashing pink and yellow at the edges, four little legs paddling at empty air.\n\"Painted turtle,\" Ariston said. \"On her back. That's bad.\"\n\"Why's it bad?\" Kellan asked.\n\"Because if she can't flip over, she'll cook in the sun. Or drown. Whichever comes first.\"\nJordan's grip tightened on her notebook.",
      "choices": [{"text": "Get closer", "next": "turtle_choice"}]
    },
    "turtle_choice": {
      "text": "They waded into the shallows in their water shoes. The turtle thrashed harder when they got close, then went still, watching them with one bright eye.\nKellan reached for her before Jordan or Ariston could get a word out.\n\"WAIT —\" Ariston started.",
      "choices": [
        {"text": "Let Kellan grab her — she's small", "next": "turtle_pinch"},
        {"text": "Stop and listen to Ariston's plan", "next": "clean_rescue"}
      ]
    },
    "turtle_pinch": {
      "text": "Kellan grabbed.\nThe turtle, for an animal stuck on her back, was extremely fast. A small head shot out of the shell, snapped down on Kellan's thumb, and held on.\nKellan looked at his thumb. Then at the turtle. Then at Jordan.\n\"Ow,\" he said calmly. \"Ow ow ow.\"\n\"DROP HER, drop her, drop her —\"\nHe did. The turtle plopped back into the shallows, still on her back, looking smugly at all three of them.\nKellan examined his thumb. A small red half-moon. No blood.\n\"Good news!\" he announced to the river. \"My thumb booboo is ALL BETTER!\"\nAriston was already breaking two short sticks off a fallen branch.\n\"Okay,\" he said. \"We do it my way. Sticks. From behind. Don't put your fingers anywhere near her face.\"",
      "choices": [{"text": "Use the sticks", "next": "turtle_team"}]
    },
    "turtle_team": {
      "text": "The three of them got into position around the turtle. Ariston on the left with one stick. Jordan on the right with the other. Kellan in the middle on lookout, mostly so he wouldn't try anything else.\n\"On three,\" Ariston said. \"We slide the sticks under the shell. We lift just enough to flip her. We do it once. Ready?\"\n\"Ready,\" said Jordan.\n\"Ready,\" said Kellan, who had no stick and no job, but very much wanted to be ready.\n\"One. Two. Three.\"\nThe sticks slid. The shell tilted. The turtle flopped onto her belly with a small, satisfied plop — and immediately walked off into the deeper water like none of this had ever happened.\n\"She didn't even say thank you,\" Kellan said.\n\"Turtles never do,\" Ariston told him.\n\"That's RUDE.\"\nJordan laughed so hard she had to sit down in the shallows. Which is how Auntie RahRah, walking down from camp to check on them, found them — three trackers, two sticks, one wet bottom. She didn't even ask. She just smiled and said, \"Tell me everything.\"",
      "isEnding": true
    },
    "clean_rescue": {
      "text": "\"Sticks,\" Ariston said. \"From behind. I've got it.\"\nJordan caught Kellan by the back of his shirt one second before Kellan committed to grabbing.\n\"Hands OFF,\" she said.\n\"AWWW.\"\nAriston broke two short sticks from a fallen branch. He handed one to Jordan. He kept one for himself. Kellan was given the very important job of standing perfectly still and not being a problem, which he accepted with surprising grace.\nThey got into position. Ariston on the left. Jordan on the right.\n\"On three,\" he said. \"We slide them under the shell at the same time. Lift, flip, done. Don't get fancy.\"\n\"One. Two. Three.\"\nThe sticks slid. The shell tipped. The turtle landed on her belly with a small wet plop and walked away into the deeper water like she'd had a long appointment to get to.\nAriston watched her go. Then he did something Jordan had never seen him do before. He smiled — not a small one. A whole grin.\n\"Clean rescue,\" he said.\nJordan wrote CLEAN RESCUE in her notebook in capital letters and drew a tiny turtle next to it. Kellan tried to draw one too. His turtle had eight legs and a hat, but no one had the heart to correct him.",

    }

};

// ══════════════════════════════════════════════════════════════
// ENGINE — do not edit below this line
// ══════════════════════════════════════════════════════════════
var HERO = STORY.heroName || "the hero";
var COLORS = ["#F48BA9","#9FE2C5","#936ED4"];
var cid = "start", hist = [], started = false;
var app = document.getElementById("app");
var endingCount = Object.values(STORY.passages).filter(function(p){return p.isEnding}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function go(id){hist.push(cid);cid=id;render();window.scrollTo({top:0,behavior:"smooth"});}
function back(){if(!hist.length)return;cid=hist.pop();render();window.scrollTo({top:0,behavior:"smooth"});}
function restart(){cid="start";hist=[];started=false;render();window.scrollTo({top:0,behavior:"smooth"});}
function home(){window.location.href="../../index.html";}
function begin(){started=true;render();}

function render(){
  if(!started){renderTitle();return;}
  var p=STORY.passages[cid];
  if(!p){app.innerHTML="<p>Oops! Something went wrong.</p>";return;}
  var isEnd=p.isEnding||!p.choices||!p.choices.length;
  var isSingle=!isEnd&&p.choices.length===1;
  var pg=hist.length+1;
  var totalEst=Object.keys(STORY.passages).length;
  var pct=Math.min(100,(hist.length/(totalEst*0.6))*100).toFixed(1);
  var img=IMAGES[cid]||"";
  var imgH=img
    ?'<div class="imgbox"><img src="'+esc(img)+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>'
    :'<div class="imgph"><div class="iph-i">&#128444;</div><div class="iph-t">Illustration coming soon</div></div>';
  var chH="";
  if(isEnd){
    chH='<div class="end-acts"><button class="btn-rs" onclick="restart()">&#8635; Start Over</button><button class="btn-bk" onclick="back()">&#8592; Go Back</button></div>';
  }else if(isSingle){
    chH='<button class="btn-cont" onclick="go(\''+esc(p.choices[0].next)+'\')">'+esc(p.choices[0].text)+'</button>';
  }else{
    var btns=p.choices.map(function(c,i){
      return '<button class="cbtn" style="background:'+COLORS[i%3]+'" onclick="go(\''+esc(c.next)+'\')"><span class="cnum">'+(i+1)+'</span>'+esc(c.text)+'</button>';
    }).join("");
    chH='<div class="clabel">What does '+esc(HERO)+' do?</div><div class="choices">'+btns+'</div>';
  }
  var bkBtn=(hist.length>0&&!isEnd)?'<button class="bnav" onclick="back()">&#8592;</button>':"";
  var chapLbl=(cid==="start")?'<div class="chap">'+esc(STORY.title)+'</div>':"";
  var endFt=isEnd?'<div class="endf"><div class="endstar">&#11088; The End &#11088;</div><div class="endnote">There are '+endingCount+' different endings &mdash; can you find them all?</div></div>':"";
  app.innerHTML='<div class="reader"><div class="topbar"><button class="bnav" onclick="home()" title="Back to library">&#127968;</button><button class="bnav" onclick="restart()" title="Start over">&#8635;</button>'+bkBtn+'<div class="pw"><div class="stitle">'+esc(STORY.title)+'</div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div></div><div class="pbw"><div class="pb">'+pg+'</div></div>'+imgH+'<div class="scard">'+chapLbl+'<div class="stxt">'+esc(p.text).replace(/\n/g,"<br><br>")+'</div>'+endFt+'</div>'+chH+'</div>';
}

function renderTitle(){
  app.innerHTML='<div class="title-scr"><a class="tlibrary" onclick="home()">&#8592; Back to library</a><div class="tstar">&#11088;</div><div class="tlabel">A Choose Your Own Adventure Story</div><h1 class="ttitle">'+esc(STORY.title)+'</h1><div class="tdiv"></div><div class="tded">'+esc(STORY.dedication)+'</div><div class="thow"><strong>How to read:</strong> Pick the choice YOU would make. Each one leads somewhere different. There are '+endingCount+' endings — can you find them all?</div><button class="tbtn" onclick="begin()">&#10024; Begin the Adventure!</button></div>';
}

render();
</script>
</body>
</html>

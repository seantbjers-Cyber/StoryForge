      "text": "Jordan woke up at 11:47 PM \u2014 she knew because she always checked the clock first, like a scientist recording data \u2014 to a sound coming from inside her closet. THUMP. THUMP. BUMP. The door wobbled. A thin stripe of golden light glowed underneath it. Then the thumping stopped. And Jordan heard something new: a tiny, sad sniffle. Like someone trying very, very hard not to cry. She sat up. She did not pull the covers over her head. She did not call for Dad. She pushed back her blankets, set both feet on the cold floor, and listened.",

    "pillow_fort": {

    "pillow_bounce": {

      "text": "Kellan jumped into a walnut-shell car and immediately started examining the steering. It had a tiny wheel connected to a vine-string system that turned the front axle, which was made from a toothpick. He tugged the vine left. The wheels turned left. He tugged right. The wheels turned right. \u201cOh, I get it,\u201d he said, and he did. He had figured out the whole mechanism in about four seconds. Jordan climbed into her own walnut car. Barnaby squeezed into a third one, but even at mouse-size his fluffy bottom stuck out the top like a muffin overflowing its wrapper. The race began! Kellan zoomed into the lead, pulling his vine-steering with confidence and taking every turn at full speed. Jordan drove carefully, finding shortcuts through the tall grass. Barnaby\u2019s car just spun in circles because his fur kept tangling in the wheels. Finally he tumbled out of the walnut entirely and rolled across the finish line like a fuzzy bowling ball. The beetle crowd went absolutely wild. Kellan took a bow. That was very impressive for someone in dinosaur pajamas. A golden giggle gem popped up from the racetrack. Their second gem!",

    "tiny_village": {
      "text": "Jordan examined the racetrack and frowned. \u201cThis track is just a flat circle,\u201d she said. \u201cWhat if we made it actually fun?\u201d Kellan grabbed a popsicle stick, snapped it in half to test the thickness, and started stacking before Jordan had even finished the sentence. He didn\u2019t build things the careful, follow-the-instructions way. He built them the pull-it-apart-and-see-how-it-works way \u2014 which was actually more useful here. Together they constructed ramps from popsicle sticks angled at just the right slope. A loop-de-loop from a perfectly curled leaf. Kellan tested the curve three times to make sure the cars wouldn\u2019t fall, which was the most patient he\u2019d been about anything all night. They added a tunnel through a hollow acorn. The beetles raced the new track and went sailing off the ramps, spinning through loops, and honking their tiny horns through the tunnel. Then Barnaby wanted to try. He squeezed into a walnut car, launched off the first ramp \u2014 and got completely, hopelessly stuck inside the acorn tunnel. Only his big yellow eyes and his wiggly little horns poked out from one end. \u201cHelp?\u201d he said in a tiny voice. Kellan grabbed one paw. Jordan grabbed the other. They pulled. POP! Barnaby flew out and tumbled three times across the track. Every beetle laughed until they couldn\u2019t breathe. A golden giggle gem appeared on top of the acorn. Their second gem! Kellan rubbed his elbow where he\u2019d tugged too hard. He looked at it thoughtfully. Then he looked up. \u201cHEY!\u201d he announced to the entire population of Tiny Land. \u201cGreat news! My elbow is ALL BETTER!\u201d",

    "final_door_library": {

      "text": "Barnaby led them away from the crowd, up a quiet hill covered in soft purple grass. The Monster World\u2019s sky was full of stars \u2014 but these stars were pink and gold, and they hummed a gentle melody, like a lullaby you almost recognized. \u201cI don\u2019t know how to find the last gem,\u201d Barnaby said quietly, sitting down. \u201cI just know that I\u2019m really glad I came through the wrong door. Because I found you.\u201d Jordan sat down beside him. Even Kellan was quiet for a moment, which was saying something. \u201cBarnaby,\u201d Jordan said, in her most serious, most certain voice, \u201cyou are one of the kindest, silliest, most wonderful friends we have ever had.\u201d Barnaby\u2019s face crinkled. A chuckle. Then a laugh \u2014 a deep, rumbly, belly-shaking laugh that made his fur ripple. Jordan and Kellan laughed too, because Barnaby\u2019s laugh was the kind you simply could not resist. Right there between the three of them, floating in the starlight, the third giggle gem appeared. Barnaby\u2019s doorknob glowed steady and bright. He reached into his fur and pulled out a small, warm, glowing star. \u201cSo you\u2019ll always have a little light,\u201d he said. Jordan put it in her pajama pocket and held it tight. That night, she set the little star on her windowsill. It still glows there. Every single night.",

    "ending_tuesday": {
      "text": "\u201cWait,\u201d said Kellan. He stepped forward. He walked right up to the biggest, most serious-looking monster in the entire group \u2014 a tall, stern green monster with eight long arms folded across his chest and a face like a grumpy rock. Every other monster watched. Then Kellan made the most ridiculous face he could possibly make. He crossed his eyes. He stuck out his tongue. He puffed out his cheeks like a blowfish. He wiggled his ears. He scrunched his nose. The serious monster stared down at him. His mouth twitched. One arm trembled. Then two. Then all eight. And then \u2014 KABOOM \u2014 he exploded into the loudest, most thunderous laughter anyone had ever heard. Every monster joined in. Barnaby laughed hardest of all. The third giggle gem burst into the air like a firework, showering everyone in warm golden sparkles. Barnaby\u2019s doorknob blazed so bright it turned into a permanent golden glow. \u201cIt\u2019s fully charged,\u201d Barnaby gasped. \u201cIt will never run out again. That means I can visit you whenever I want!\u201d Jordan grinned. \u201cHow about every Tuesday?\u201d And so, every Tuesday night, Jordan and Kellan hear a soft THUMP from the closet. They open the door, and there\u2019s Barnaby \u2014 big and fluffy and smiling \u2014 ready for a brand new adventure. Some doors are meant to stay open.",

var HERO = STORY.heroName || "the hero";
var COLORS = ["#1A3A0F","#7C1D35","#1A2E5A"];
var cid = "start", hist = [], started = false;
var app = document.getElementById("app");
var endingCount = Object.values(STORY.passages).filter(function(p){return p.isEnding}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function go(id){hist.push(cid);cid=id;render();window.scrollTo({top:0,behavior:"smooth"});}
function back(){if(!hist.length)return;cid=hist.pop();render();window.scrollTo({top:0,behavior:"smooth"});}
function restart(){cid="start";hist=[];started=false;render();window.scrollTo({top:0,behavior:"smooth"});}
function begin(){started=true;render();}

function render(){
  if(!started){renderTitle();return;}
  var p=STORY.passages[cid];
  if(!p){app.innerHTML="<p>Oops! Something went wrong.</p>";return;}
  var isEnd=p.isEnding||!p.choices||!p.choices.length;
  var isSingle=!isEnd&&p.choices.length===1;
  var pg=hist.length+1;
  var totalEst=Object.keys(STORY.passages).length;
  var pct=Math.min(100,(hist.length/(totalEst*0.6))*100).toFixed(1);
  var img=IMAGES[cid]||"";
  var imgH=img
    ?'<div class="imgbox"><img src="'+esc(img)+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>'
    :'<div class="imgph"><div class="iph-i">&#128444;</div><div class="iph-t">Illustration coming soon</div></div>';
  var chH="";
  if(isEnd){
    chH='<div class="end-acts"><button class="btn-rs" onclick="restart()">&#8635; Start Over</button><button class="btn-bk" onclick="back()">&#8592; Go Back</button></div>';
  }else if(isSingle){
    chH='<button class="btn-cont" onclick="go(\''+esc(p.choices[0].next)+'\')">'+esc(p.choices[0].text)+'</button>';
  }else{
    var btns=p.choices.map(function(c,i){
      return '<button class="cbtn" style="background:'+COLORS[i%3]+'" onclick="go(\''+esc(c.next)+'\')"><span class="cnum">'+(i+1)+'</span>'+esc(c.text)+'</button>';
    }).join("");
    chH='<div class="clabel">What does '+esc(HERO)+' do?</div><div class="choices">'+btns+'</div>';
  }
  var bkBtn=(hist.length>0&&!isEnd)?'<button class="bnav" onclick="back()">&#8592;</button>':"";
  var chapLbl=(cid==="start")?'<div class="chap">'+esc(STORY.title)+'</div>':"";
  var endFt=isEnd?'<div class="endf"><div class="endstar">&#11088; The End &#11088;</div><div class="endnote">There are '+endingCount+' different endings &mdash; can you find them all?</div></div>':"";
  app.innerHTML='<div class="reader"><div class="topbar"><button class="bnav" onclick="restart()">&#127968;</button>'+bkBtn+'<div class="pw"><div class="stitle">'+esc(STORY.title)+'</div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div></div><div class="pbw"><div class="pb">'+pg+'</div></div>'+imgH+'<div class="scard">'+chapLbl+'<div class="stxt">'+esc(p.text)+'</div>'+endFt+'</div>'+chH+'</div>';
}

function renderTitle(){
  app.innerHTML='<div class="title-scr"><div class="tstar">&#11088;</div><div class="tlabel">A Choose Your Own Adventure Story</div><h1 class="ttitle">'+esc(STORY.title)+'</h1><div class="tdiv"></div><div class="tded">'+esc(STORY.dedication)+'</div><div class="thow"><strong>How to read:</strong> Pick the choice YOU would make. Each one leads somewhere different. There are '+endingCount+' endings \u2014 can you find them all?</div><button class="tbtn" onclick="begin()">&#10024; Begin the Adventure!</button></div>';
}

render();
</script>
